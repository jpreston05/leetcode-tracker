# Evening review reminder: lists what's due (NZ time) and emails via Resend —
# but only on days when something is actually due. Silence is a feature.
#
# Required repository secrets:
#   SUPABASE_URL         https://<ref>.supabase.co   (same as keep-warm)
#   SUPABASE_SECRET_KEY  sb_secret_... (service role: bypasses RLS to read due rows;
#                        used ONLY here, never in the app)
#   RESEND_API_KEY       from resend.com (free tier)
#   REMINDER_EMAIL       where to send it
name: Daily review reminder

on:
  schedule:
    - cron: "0 5 * * *" # 05:00 UTC = 17:00 NZST / 18:00 NZDT
  workflow_dispatch: {} # manual trigger for testing

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch due reviews
        id: due
        run: |
          TODAY=$(TZ=Pacific/Auckland date +%F)
          curl -sf -o rows.json \
            "${SUPABASE_URL}/rest/v1/checkpoints?select=interval_label,is_catchup,questions(leetcode_number,title,url)&status=neq.done&due_date=lte.${TODAY}&order=due_date" \
            -H "apikey: ${SUPABASE_SECRET_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SECRET_KEY}"
          count=$(jq length rows.json)
          echo "Due today (${TODAY}): ${count}"
          echo "count=${count}" >> "$GITHUB_OUTPUT"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      - name: Send reminder email
        if: steps.due.outputs.count != '0'
        run: |
          n="${{ steps.due.outputs.count }}"
          plural=$([ "$n" = "1" ] && echo "review" || echo "reviews")
          # one <li> per due problem: linked title + which review it is
          items=$(jq -r '.[] | "<li style=\"margin:0 0 6px\"><a href=\"\(.questions.url)\">\(.questions.leetcode_number|tostring). \(.questions.title | @html)</a> — \(.interval_label)\(if .is_catchup then "" else " review" end)</li>"' rows.json)
          payload=$(jq -n \
            --arg to "$REMINDER_EMAIL" \
            --arg subject "${n} ${plural} due tonight" \
            --arg html "<p>${n} ${plural} in the queue:</p><ul style=\"padding-left:20px\">${items}</ul><p>Every rung climbed is a step closer to Sydney.</p>" \
            '{from: "LeetCode Tracker <onboarding@resend.dev>", to: [$to], subject: $subject, html: $html}')
          curl -sf https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$payload"
          echo "Reminder sent (${n} due)."
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REMINDER_EMAIL: ${{ secrets.REMINDER_EMAIL }}
