# Daily review reminder: emails via Resend every day (NZ time). Due problems
# are grouped by which review they are; on clear days it nudges toward solving
# something new instead, unless today's tasks are already done.
#
# Required repository secrets:
#   SUPABASE_URL         https://<ref>.supabase.co   (same as keep-warm)
#   SUPABASE_SECRET_KEY  sb_secret_... (service role: bypasses RLS to read due rows;
#                        used ONLY here, never in the app)
#   RESEND_API_KEY       from resend.com (free tier)
#   REMINDER_EMAIL       where to send it
name: Daily review reminder

on:
  schedule:
    # Off-the-hour minute deliberately: GitHub queues scheduled workflows and
    # :00 is the most congested slot, which is likely why the old 05:00 UTC
    # run was landing closer to 08:00 UTC in practice.
    - cron: "7 0 * * *" # ~00:07 UTC = ~12:07 NZST / ~13:07 NZDT
  workflow_dispatch: {} # manual trigger for testing

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch due reviews
        id: due
        run: |
          TODAY=$(TZ=Pacific/Auckland date +%F)
          curl -sf -o rows.json \
            "${SUPABASE_URL}/rest/v1/checkpoints?select=interval_label,interval_days,is_catchup,due_date,questions(leetcode_number,title,url)&status=neq.done&due_date=lte.${TODAY}&order=due_date" \
            -H "apikey: ${SUPABASE_SECRET_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SECRET_KEY}"
          count=$(jq length rows.json)
          echo "Due today (${TODAY}): ${count}"
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          echo "today=${TODAY}" >> "$GITHUB_OUTPUT"

          # activity_daily is solved-or-reviewed counts for the day, so this
          # tells us whether the zero-due case is "nothing was ever due" or
          # "due items got knocked out earlier today".
          curl -sf -o activity.json \
            "${SUPABASE_URL}/rest/v1/activity_daily?day=eq.${TODAY}&select=total" \
            -H "apikey: ${SUPABASE_SECRET_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SECRET_KEY}"
          done_today=$(jq '(.[0].total // 0) > 0' activity.json)
          echo "Activity today (${TODAY}): done_today=${done_today}"
          echo "done_today=${done_today}" >> "$GITHUB_OUTPUT"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      - name: Send reminder email
        run: |
          n="${{ steps.due.outputs.count }}"
          done_today="${{ steps.due.outputs.done_today }}"
          plural=$([ "$n" = "1" ] && echo "review" || echo "reviews")
          # Rotate the closing line and date the subject: identical trailing
          # text in a same-subject thread is exactly what Gmail collapses as
          # "quoted text". Keep this list in sync with src/lib/quotes.ts.
          QUOTES=(
            "Every rung climbed is a step closer to Sydney."
            "Six months of steady beats six weeks of cramming."
            "You're building the engineer that Sydney offer letter goes to."
            "Today's review is tomorrow's calm interview."
            "Consistency is the whole trick. Show up today."
            "The harbour view is rented with days like this."
            "Forgetting is human. Reviewing is the edge."
            "One problem re-solved beats three half-remembered."
            "Future you, in Sydney, is grateful for today."
            "Slow is smooth, smooth is fast — keep climbing."
          )
          doy=$(TZ=Pacific/Auckland date +%j)
          quote="${QUOTES[$((10#$doy % ${#QUOTES[@]}))]}"
          nice_date=$(TZ=Pacific/Auckland date '+%a %d %b')
          if [ "$n" = "0" ] && [ "$done_today" = "true" ]; then
            subject="Nice work — today's tasks are done · ${nice_date}"
            body="<p>Everything due today is done — nice work. Nothing left on the ladder for today; rest up or get ahead with a new problem if you're keen.</p>"
          elif [ "$n" = "0" ]; then
            subject="All clear today — solve something new · ${nice_date}"
            body="<p>Nothing is due today — the ladder is clear. Good time to pick up one or two new problems and keep the momentum going.</p>"
          else
            subject="${n} ${plural} due today · ${nice_date}"
            # Sections per review interval (regular reviews first, then
            # catch-ups), each a heading + list of linked problems.
            # "3 days" -> "3-day reviews"; "3-day catch-up" -> "3-day catch-ups".
            # Anything older than today gets an "overdue N days" tag.
            sections=$(jq -r --arg today "${{ steps.due.outputs.today }}" '
              def days_late:
                (($today + "T00:00:00Z" | fromdate)
                 - (.due_date + "T00:00:00Z" | fromdate)) / 86400 | round;
              group_by([.is_catchup, .interval_days])
              | map(
                  "<p style=\"margin:14px 0 4px\"><strong>"
                  + (if .[0].is_catchup
                     then (.[0].interval_label | @html) + "s"
                     else (.[0].interval_label | sub("s$"; "") | gsub(" "; "-") | @html) + " reviews"
                     end)
                  + " (" + (length | tostring) + ")</strong></p>"
                  + "<ul style=\"margin:0;padding-left:20px\">"
                  + (map(
                      "<li style=\"margin:0 0 6px\"><a href=\"\(.questions.url)\">\(.questions.leetcode_number|tostring). \(.questions.title | @html)</a>"
                      + (if .due_date < $today
                         then " — <strong>overdue \(days_late) day\(if days_late == 1 then "" else "s" end)</strong>"
                         else "" end)
                      + "</li>"
                    ) | join(""))
                  + "</ul>"
                )
              | join("")' rows.json)
            body="<p>${n} ${plural} in the queue:</p>${sections}"
          fi
          payload=$(jq -n \
            --arg to "$REMINDER_EMAIL" \
            --arg subject "$subject" \
            --arg html "<p>Good afternoon Jack,</p>${body}<p>${quote}</p>" \
            '{from: "LeetCode Tracker <onboarding@resend.dev>", to: [$to], subject: $subject, html: $html}')
          curl -sf https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$payload"
          echo "Reminder sent (${n} due)."
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REMINDER_EMAIL: ${{ secrets.REMINDER_EMAIL }}
